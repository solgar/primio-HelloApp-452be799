name: primio_app
description: A Primio-generated Flutter app
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter

  # Core packages (fully cross-platform)
  cupertino_icons: ^1.0.6
  dio: ^5.8.0
  provider: ^6.1.1

  # OS integration / UX helpers
  url_launcher: ^6.3.2
  awesome_notifications: ^0.10.1
  path: ^1.9.1
  collection: ^1.19.1
  async: ^2.13.0

  # Data persistence (cross-platform)
  shared_preferences: ^2.5.3
  path_provider: ^2.1.5
  flutter_secure_storage: ^9.2.4

  # Remote database and networking
  http: ^1.4.0

  # Navigation (fully cross-platform)
  go_router: ^14.1.4

  # ─── Media (images / video / audio) ───
  image: ^4.5.4
  video_player: ^2.10.0

  # UI utilities (fully cross-platform)
  flutter_svg: ^2.2.0
  google_fonts: ^6.3.2
  flex_color_scheme: ^8.2.0
  flutter_hooks: ^0.20.5
  loading_animation_widget: ^1.2.1
  flutter_staggered_grid_view: ^0.7.0
  animations: ^2.0.11
  flutter_spinkit: ^5.2.1
  cached_network_image: ^3.3.1
  flutter_animate: ^4.5.2
  fl_chart: ^0.71.0
  shimmer_animation: ^2.2.2
  responsive_framework: ^1.5.1
  table_calendar: ^3.2.0
  carousel_slider: ^5.1.1

  # Utilities
  intl: ^0.20.2
  uuid: ^4.2.1
  vector_math: ^2.1.4
  crypto: ^3.0.6
  package_info_plus: ^8.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
